name: Frontend CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: puchi-frontend
  INFRA_REPO: puchidemy/puchi-infra
  INFRA_PATH: infra/frontend/web/deployment.yaml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  build-and-push:
    if: github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=git-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=https://puchi.io.vn
            NEXT_PUBLIC_API_URL=https://api.puchi.io.vn
            NEXT_PUBLIC_WEBSITE_DOMAIN=https://puchi.io.vn

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: puchi-infra

      - name: Update deployment.yaml with new image tag
        run: |
          SHA_TAG="git-${GITHUB_SHA::7}"
          NEW_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$SHA_TAG"
          sed -i "s|image: ghcr.io/puchidemy/${{ env.IMAGE_NAME }}:.*|image: $NEW_IMAGE|" "puchi-infra/${{ env.INFRA_PATH }}"
          echo "Updated ${{ env.INFRA_PATH }} to $NEW_IMAGE"

      - name: Commit and push to infra repo
        run: |
          cd puchi-infra
          git config --global user.name "puchi-bot"
          git config --global user.email "bot@puchi.io.vn"
          git add "${{ env.INFRA_PATH }}"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ${{ env.IMAGE_NAME }} image to ${{ github.sha }}

            Automated by CI/CD for commit ${{ github.sha }}"
            git pull --rebase
            git push
          fi
