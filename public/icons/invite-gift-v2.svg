<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lid shadow -->
  <rect x="5" y="16" width="38" height="10" rx="3" fill="#C92A2A"/>
  <!-- Lid top -->
  <rect x="5" y="14" width="38" height="9" rx="3" fill="#FF4B4B"/>
  <rect x="5" y="14" width="38" height="4.5" rx="3" fill="#FF7A7A"/>
  <!-- Box body -->
  <rect x="7" y="23" width="34" height="20" rx="3" fill="#E03E3E"/>
  <rect x="7" y="23" width="34" height="8" rx="3" fill="#FF4B4B"/>
  <!-- Vertical ribbon -->
  <rect x="21" y="14" width="6" height="29" fill="#FFD900"/>
  <rect x="21" y="14" width="6" height="12" fill="#FFE75C"/>
  <!-- Horizontal ribbon on lid -->
  <rect x="5" y="17" width="38" height="5" fill="#FFD900"/>
  <rect x="5" y="17" width="38" height="2.5" fill="#FFE75C"/>
  <!-- Bow left -->
  <ellipse cx="16" cy="11" rx="7" ry="5" fill="#FFD900"/>
  <ellipse cx="16" cy="10" rx="7" ry="3.5" fill="#FFE75C"/>
  <!-- Bow right -->
  <ellipse cx="32" cy="11" rx="7" ry="5" fill="#FFD900"/>
  <ellipse cx="32" cy="10" rx="7" ry="3.5" fill="#FFE75C"/>
  <!-- Knot -->
  <rect x="20" y="8" width="8" height="8" rx="2" fill="#FFD900"/>
  <rect x="20" y="8" width="8" height="4" rx="2" fill="#FFE75C"/>
  <!-- Sparkles -->
  <circle cx="42" cy="30" r="2" fill="#FFD900"/>
  <circle cx="4" cy="28" r="1.5" fill="#58CC02"/>
</svg>
